name: Build APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🧰 Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            python3-dev \
            cmake \
            automake \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo-dev \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            zip \
            unzip \
            libgstreamer1.0-dev
          
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: ⚙️ Build APK with Buildozer
        run: |
          # سيقوم Buildozer بتحميل الـ SDK والـ NDK المناسبين تلقائياً
          yes | buildozer -v android debug
          
      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prayer-Times-APK
          path: bin/*.apk
