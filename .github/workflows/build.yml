name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 🧰 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo-dev \
            cmake \
            libffi-dev \
            libssl-dev

          pip install --upgrade pip
          pip install buildozer cython

      - name: 📱 Install Android SDK
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip

           mv cmdline-tools latest
          mkdir -p $SDK_DIR/tools/bin
          ln -s $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses

          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0"

          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          echo "PATH=$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$SDK_DIR/build-tools/31.0.0:$PATH" >> $GITHUB_ENV
      - name: 🔧 Fix build issues
        run: |
          export P4A_NO_BUILD=1
      - name: ⚙️ Build APK
        run: |
          buildozer android debug --bootstrap=sdl2 --requirements=python3,kivy

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
